<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="اختبار التعبيرات النمطية مجاناً أونلاين - ToolBox">
  <meta property="og:title" content="اختبار التعبيرات النمطية | ToolBox">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#e63946">
  <title>اختبار التعبيرات النمطية | ToolBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body dir="rtl">
<header class="header">
  <div class="header-inner">
    <a href=".." class="logo"><div class="logo-icon">🔧</div><span class="logo-text">Tool<span>Box</span></span></a>
    <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="ابحث عن أداة..." data-ar-placeholder="ابحث عن أداة..." data-en-placeholder="Search tools..."><div class="search-results" id="search-results"></div></div>
    <div class="header-actions">
      <button class="btn-icon" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
    </div>
  </div>
</header>
<div class="tool-page">
  <div class="tool-hero">
    <div class="tool-hero-inner">
      <div class="breadcrumb">
        <a href=".." data-ar="الرئيسية" data-en="Home">الرئيسية</a>
        <span>›</span>
        <span data-ar="أدوات المطورين" data-en="Developer Tools">أدوات المطورين</span>
        <span>›</span>
        <span>اختبار التعبيرات النمطية</span>
      </div>
      <div class="tool-title-area">
        <span class="tool-big-icon">🔍</span>
        <div>
          <h1 data-ar="اختبار التعبيرات النمطية" data-en="Regex Tester">اختبار التعبيرات النمطية</h1>
          <p data-ar="اختبر التعبيرات النمطية مع تظليل التطابقات في الوقت الفعلي" data-en="Test regular expressions with real-time match highlighting">اختبر التعبيرات النمطية مع تظليل التطابقات في الوقت الفعلي</p>
        </div>
      </div>
      <div class="tool-meta">
        <div class="tool-stat-badge">📊 <span data-ar="الاستخدامات:" data-en="Uses:">الاستخدامات:</span> <span class="val" id="tool-usage-count">0</span></div>
        <div class="tool-stat-badge">👥 <span class="val" id="tool-live-users">--</span> <span data-ar="الآن" data-en="online">الآن</span></div>
        <button class="btn-icon" id="tool-fav-btn" title="مفضلة">🤍</button>
      </div>
    </div>
  </div>
  <div class="tool-workspace">
    <div class="ad-banner" style="margin-bottom:20px">📢 <span data-ar="مساحة إعلانية - Google AdSense" data-en="Ad Space - Google AdSense">مساحة إعلانية</span></div>
    <div class="tool-box">
      <h3 data-ar="🔍 التعبير النمطي" data-en="🔍 Regular Expression">🔍 التعبير النمطي</h3>
      <div class="grid-2">
        <div class="form-group">
          <label data-ar="النمط" data-en="Pattern">النمط</label>
          <input type="text" class="form-control" id="regex-pattern" placeholder="\d+" style="font-family:monospace">
        </div>
        <div class="form-group">
          <label data-ar="الأعلام (flags)" data-en="Flags">الأعلام</label>
          <input type="text" class="form-control" id="regex-flags" placeholder="gi" maxlength="5" style="font-family:monospace">
        </div>
      </div>
      <div class="form-group">
        <label data-ar="النص للاختبار" data-en="Test Text">النص للاختبار</label>
        <textarea class="form-control" id="regex-text" rows="6"
          placeholder="أدخل النص الذي تريد البحث فيه..."
          style="font-family:monospace"></textarea>
      </div>
      <button class="btn-red" style="width:100%;padding:14px;font-size:1.05rem" onclick="testRegex()"
        data-ar="🔍 اختبار" data-en="🔍 Test Regex">🔍 اختبار</button>
    </div>
    <div class="tool-box" id="result-section" style="display:none">
      <h3 data-ar="✅ النتائج" data-en="✅ Results">✅ النتائج</h3>
      <p id="regex-stats" style="color:var(--accent-yellow);font-weight:700;margin-bottom:12px"></p>
      <div id="regex-output" style="background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:16px;font-family:monospace;font-size:0.9rem;white-space:pre-wrap;line-height:1.8;max-height:300px;overflow-y:auto"></div>
      <div id="match-details" style="margin-top:12px;display:flex;flex-direction:column;gap:8px"></div>
    </div>

    <div class="share-section">
      <h4 data-ar="📤 شارك هذه الأداة" data-en="📤 Share this tool">📤 شارك هذه الأداة</h4>
      <div class="share-btns">
        <button class="share-btn facebook" id="share-facebook">f Facebook</button>
        <button class="share-btn telegram" id="share-telegram">✈ Telegram</button>
        <button class="share-btn whatsapp" id="share-whatsapp">📱 WhatsApp</button>
        <button class="share-btn twitter" id="share-twitter">𝕏 Twitter</button>
      </div>
    </div>
    <div class="rating-section">
      <h4 data-ar="⭐ هل كانت هذه الأداة مفيدة؟" data-en="⭐ Was this tool helpful?">⭐ هل كانت هذه الأداة مفيدة؟</h4>
      <div class="rating-btns">
        <button class="rating-btn like" id="rate-like">👍 <span data-ar="نعم" data-en="Yes">نعم</span></button>
        <button class="rating-btn dislike" id="rate-dislike">👎 <span data-ar="لا" data-en="No">لا</span></button>
      </div>
      <div class="rating-bar-wrap"><div class="rating-bar" id="rating-bar" style="width:0%"></div></div>
      <p class="rating-text" id="rating-text"></p>
    </div>
    <div class="ad-banner" style="margin-top:20px">📢 <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div>
  </div>
</div>
<div id="toast-container" class="toast-container"></div>
<div id="loading-overlay" class="loading-overlay"><div class="spinner"></div><div class="loading-text"></div></div>
<script src="../js/app.js"></script>
<script src="../js/tools/dev-tools.js"></script>
<script>initRegexTester();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="محوّل المناطق الزمنية - تحويل الوقت من بغداد وحول العالم - ToolBox">
  <meta property="og:title" content="محوّل المناطق الزمنية | ToolBox">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#e63946">
  <title>محوّل المناطق الزمنية | ToolBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .tz-clock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .tz-clock-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      transition: all var(--transition);
    }
    .tz-clock-card:hover { border-color: var(--accent-red); }
    .tz-clock-card.highlight { border-color: var(--accent-yellow); box-shadow: 0 0 12px rgba(255,209,102,0.2); }
    .tz-clock-card .tz-city { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; }
    .tz-clock-card .tz-time { font-size: 1.6rem; font-weight: 900; color: var(--text-primary); }
    .tz-clock-card .tz-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .tz-clock-card .tz-flag { font-size: 1.4rem; margin-bottom: 6px; }
    .tz-offset-badge {
      display: inline-block; font-size: 0.7rem; color: var(--text-muted);
      background: var(--bg-secondary); padding: 2px 8px; border-radius: 10px;
      margin-top: 6px;
    }
  </style>
</head>
<body dir="rtl">
<header class="header">
  <div class="header-inner">
    <a href=".." class="logo"><div class="logo-icon">🔧</div><span class="logo-text">Tool<span>Box</span></span></a>
    <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="ابحث عن أداة..." data-ar-placeholder="ابحث عن أداة..." data-en-placeholder="Search tools..."><div class="search-results" id="search-results"></div></div>
    <div class="header-actions">
      <button class="btn-icon" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
    </div>
  </div>
</header>
<div class="tool-page">
  <div class="tool-hero">
    <div class="tool-hero-inner">
      <div class="breadcrumb">
        <a href=".." data-ar="الرئيسية" data-en="Home">الرئيسية</a>
        <span>›</span>
        <span data-ar="الحاسبات" data-en="Calculators">الحاسبات</span>
        <span>›</span>
        <span data-ar="محوّل المناطق الزمنية" data-en="Timezone Converter">محوّل المناطق الزمنية</span>
      </div>
      <div class="tool-title-area">
        <span class="tool-big-icon">🕐</span>
        <div>
          <h1 data-ar="محوّل المناطق الزمنية" data-en="Timezone Converter">محوّل المناطق الزمنية</h1>
          <p data-ar="تحويل الوقت بين بغداد وكبريات مدن العالم" data-en="Convert time between Baghdad and major world cities">تحويل الوقت بين بغداد وكبريات مدن العالم</p>
        </div>
      </div>
      <div class="tool-meta">
        <div class="tool-stat-badge">📊 <span data-ar="الاستخدامات:" data-en="Uses:">الاستخدامات:</span> <span class="val" id="tool-usage-count">0</span></div>
        <div class="tool-stat-badge">👥 <span class="val" id="tool-live-users">--</span> <span data-ar="الآن" data-en="online">الآن</span></div>
        <button class="btn-icon" id="tool-fav-btn" title="مفضلة">🤍</button>
      </div>
    </div>
  </div>
  <div class="tool-workspace">
    <div class="ad-banner" style="margin-bottom:20px">📢 <span data-ar="مساحة إعلانية - Google AdSense" data-en="Ad Space - Google AdSense">مساحة إعلانية</span></div>

    <!-- Converter -->
    <div class="tool-box">
      <h3 data-ar="🔄 تحويل الوقت" data-en="🔄 Convert Time">🔄 تحويل الوقت</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="two-col-grid">
        <div class="form-group">
          <label data-ar="المنطقة الزمنية المصدر" data-en="Source Timezone">المنطقة الزمنية المصدر</label>
          <select id="tz-from" class="form-control" onchange="convertTZ()"></select>
        </div>
        <div class="form-group">
          <label data-ar="المنطقة الزمنية الهدف" data-en="Target Timezone">المنطقة الزمنية الهدف</label>
          <select id="tz-to" class="form-control" onchange="convertTZ()"></select>
        </div>
      </div>
      <div class="form-group">
        <label data-ar="التاريخ والوقت" data-en="Date and Time">التاريخ والوقت</label>
        <input type="datetime-local" id="tz-input" class="form-control" oninput="convertTZ()">
      </div>
      <button class="btn-red" style="width:100%;padding:14px" onclick="convertTZ()"
        data-ar="🕐 تحويل الوقت" data-en="🕐 Convert Time">🕐 تحويل الوقت</button>
    </div>

    <!-- Result -->
    <div class="tool-box" id="tz-result-box" style="display:none">
      <h3 data-ar="✅ النتيجة" data-en="✅ Result">✅ النتيجة</h3>
      <div id="tz-result" style="font-size:1.3rem;font-weight:700;color:var(--accent-yellow);text-align:center;padding:16px"></div>
      <div id="tz-details" style="margin-top:12px"></div>
    </div>

    <!-- World Clock -->
    <div class="tool-box">
      <h3 data-ar="🌍 ساعة العالم" data-en="🌍 World Clock">🌍 ساعة العالم</h3>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px" data-ar="الوقت الحالي في أهم المدن" data-en="Current time in major cities">الوقت الحالي في أهم المدن</p>
      <div class="tz-clock-grid" id="world-clock"></div>
    </div>

    <div class="share-section">
      <h4 data-ar="📤 شارك هذه الأداة" data-en="📤 Share this tool">📤 شارك هذه الأداة</h4>
      <div class="share-btns">
        <button class="share-btn facebook" id="share-facebook">f Facebook</button>
        <button class="share-btn telegram" id="share-telegram">✈ Telegram</button>
        <button class="share-btn whatsapp" id="share-whatsapp">📱 WhatsApp</button>
        <button class="share-btn twitter" id="share-twitter">𝕏 Twitter</button>
      </div>
    </div>
    <div class="rating-section">
      <h4 data-ar="⭐ هل كانت هذه الأداة مفيدة؟" data-en="⭐ Was this tool helpful?">⭐ هل كانت هذه الأداة مفيدة؟</h4>
      <div class="rating-btns">
        <button class="rating-btn like" id="rate-like">👍 <span data-ar="نعم" data-en="Yes">نعم</span></button>
        <button class="rating-btn dislike" id="rate-dislike">👎 <span data-ar="لا" data-en="No">لا</span></button>
      </div>
      <div class="rating-bar-wrap"><div class="rating-bar" id="rating-bar" style="width:0%"></div></div>
      <p class="rating-text" id="rating-text"></p>
    </div>
    <div class="ad-banner" style="margin-top:20px">📢 <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div>
  </div>
</div>
<div id="toast-container" class="toast-container"></div>
<div id="loading-overlay" class="loading-overlay"><div class="spinner"></div><div class="loading-text"></div></div>
<script src="../js/app.js"></script>
<script src="../js/tools/converters.js"></script>
<script>initTimezoneConverter();</script>
</body>
</html>

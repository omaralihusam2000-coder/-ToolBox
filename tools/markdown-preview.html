<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="معاينة Markdown مجاناً أونلاين - ToolBox">
  <meta property="og:title" content="معاينة Markdown | ToolBox">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#e63946">
  <title>معاينة Markdown | ToolBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body dir="rtl">
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo"><div class="logo-icon">🔧</div><span class="logo-text">Tool<span>Box</span></span></a>
    <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="ابحث عن أداة..." data-ar-placeholder="ابحث عن أداة..." data-en-placeholder="Search tools..."><div class="search-results" id="search-results"></div></div>
    <div class="header-actions">
      <button class="btn-icon" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
    </div>
  </div>
</header>
<div class="tool-page">
  <div class="tool-hero">
    <div class="tool-hero-inner">
      <div class="breadcrumb">
        <a href="/" data-ar="الرئيسية" data-en="Home">الرئيسية</a>
        <span>›</span>
        <span data-ar="أدوات المطورين" data-en="Developer Tools">أدوات المطورين</span>
        <span>›</span>
        <span>معاينة Markdown</span>
      </div>
      <div class="tool-title-area">
        <span class="tool-big-icon">📋</span>
        <div>
          <h1 data-ar="معاينة Markdown" data-en="Markdown Preview">معاينة Markdown</h1>
          <p data-ar="اكتب Markdown وشاهد المعاينة الحية في الوقت الفعلي" data-en="Write Markdown and see a live preview in real-time">اكتب Markdown وشاهد المعاينة الحية في الوقت الفعلي</p>
        </div>
      </div>
      <div class="tool-meta">
        <div class="tool-stat-badge">📊 <span data-ar="الاستخدامات:" data-en="Uses:">الاستخدامات:</span> <span class="val" id="tool-usage-count">0</span></div>
        <div class="tool-stat-badge">👥 <span class="val" id="tool-live-users">--</span> <span data-ar="الآن" data-en="online">الآن</span></div>
        <button class="btn-icon" id="tool-fav-btn" title="مفضلة">🤍</button>
      </div>
    </div>
  </div>
  <div class="tool-workspace">
    <div class="ad-banner" style="margin-bottom:20px">📢 <span data-ar="مساحة إعلانية - Google AdSense" data-en="Ad Space - Google AdSense">مساحة إعلانية</span></div>
    <div class="tool-box" style="padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-color)">
        <h3 style="margin:0" data-ar="✍️ المحرر" data-en="✍️ Editor">✍️ المحرر</h3>
        <div style="display:flex;gap:8px">
          <button class="btn-outline" style="padding:6px 14px;font-size:0.8rem" onclick="copyMarkdown()"
            data-ar="نسخ Markdown" data-en="Copy Markdown">نسخ Markdown</button>
          <button class="btn-outline" style="padding:6px 14px;font-size:0.8rem" onclick="downloadMarkdown()"
            data-ar="⬇ تحميل .md" data-en="⬇ Download .md">⬇ تحميل .md</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;min-height:500px">
        <textarea id="md-input" oninput="updateMarkdownPreview()"
          style="background:var(--bg-primary);border:none;border-inline-end:1px solid var(--border-color);color:var(--text-primary);font-family:monospace;font-size:0.9rem;padding:20px;resize:none;outline:none;line-height:1.7;min-height:500px"></textarea>
        <div id="md-preview"
          style="padding:20px;overflow-y:auto;line-height:1.8;font-size:0.95rem;max-height:500px;color:var(--text-primary)"></div>
      </div>
    </div>
    <style>
      #md-preview h1,#md-preview h2,#md-preview h3{color:var(--text-primary);margin:16px 0 8px;font-weight:800}
      #md-preview h1{font-size:1.8rem;border-bottom:2px solid var(--accent-red);padding-bottom:8px}
      #md-preview h2{font-size:1.4rem}
      #md-preview code{background:var(--bg-hover);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:0.85rem;color:var(--accent-yellow)}
      #md-preview pre{background:var(--bg-hover);border:1px solid var(--border-color);border-radius:8px;padding:16px;overflow-x:auto}
      #md-preview pre code{background:none;padding:0;color:var(--text-primary)}
      #md-preview blockquote{border-right:4px solid var(--accent-red);margin:0;padding:8px 16px;background:rgba(230,57,70,0.05);border-radius:0 8px 8px 0}
      #md-preview a{color:var(--accent-blue)}
      #md-preview img{max-width:100%;border-radius:8px}
      #md-preview table{width:100%;border-collapse:collapse;margin:16px 0}
      #md-preview th,#md-preview td{border:1px solid var(--border-color);padding:8px 12px}
      #md-preview th{background:var(--bg-hover);font-weight:700}
      #md-preview ul,#md-preview ol{padding-inline-start:24px}
    </style>

    <div class="share-section">
      <h4 data-ar="📤 شارك هذه الأداة" data-en="📤 Share this tool">📤 شارك هذه الأداة</h4>
      <div class="share-btns">
        <button class="share-btn facebook" id="share-facebook">f Facebook</button>
        <button class="share-btn telegram" id="share-telegram">✈ Telegram</button>
        <button class="share-btn whatsapp" id="share-whatsapp">📱 WhatsApp</button>
        <button class="share-btn twitter" id="share-twitter">𝕏 Twitter</button>
      </div>
    </div>
    <div class="rating-section">
      <h4 data-ar="⭐ هل كانت هذه الأداة مفيدة؟" data-en="⭐ Was this tool helpful?">⭐ هل كانت هذه الأداة مفيدة؟</h4>
      <div class="rating-btns">
        <button class="rating-btn like" id="rate-like">👍 <span data-ar="نعم" data-en="Yes">نعم</span></button>
        <button class="rating-btn dislike" id="rate-dislike">👎 <span data-ar="لا" data-en="No">لا</span></button>
      </div>
      <div class="rating-bar-wrap"><div class="rating-bar" id="rating-bar" style="width:0%"></div></div>
      <p class="rating-text" id="rating-text"></p>
    </div>
    <div class="ad-banner" style="margin-top:20px">📢 <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div>
  </div>
</div>
<div id="toast-container" class="toast-container"></div>
<div id="loading-overlay" class="loading-overlay"><div class="spinner"></div><div class="loading-text"></div></div>
<script src="/js/app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="/js/tools/dev-tools.js"></script>
<script>initMarkdownPreview();</script>
</body>
</html>

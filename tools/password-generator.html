<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="مولد كلمات المرور القوية مجاناً أونلاين - ToolBox">
  <meta property="og:title" content="مولد كلمات المرور القوية | ToolBox">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#e63946">
  <title>مولد كلمات المرور القوية | ToolBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body dir="rtl">
<header class="header">
  <div class="header-inner">
    <a href=".." class="logo"><div class="logo-icon">🔧</div><span class="logo-text">Tool<span>Box</span></span></a>
    <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="ابحث عن أداة..." data-ar-placeholder="ابحث عن أداة..." data-en-placeholder="Search tools..."><div class="search-results" id="search-results"></div></div>
    <div class="header-actions">
      <button class="btn-icon" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
    </div>
  </div>
</header>
<div class="tool-page">
  <div class="tool-hero">
    <div class="tool-hero-inner">
      <div class="breadcrumb">
        <a href=".." data-ar="الرئيسية" data-en="Home">الرئيسية</a>
        <span>›</span>
        <span data-ar="أدوات المطورين" data-en="Developer Tools">أدوات المطورين</span>
        <span>›</span>
        <span>مولد كلمات المرور القوية</span>
      </div>
      <div class="tool-title-area">
        <span class="tool-big-icon">🔑</span>
        <div>
          <h1 data-ar="مولد كلمات المرور القوية" data-en="Password Generator">مولد كلمات المرور القوية</h1>
          <p data-ar="أنشئ كلمات مرور قوية وعشوائية بأمان تام" data-en="Generate strong, random, cryptographically secure passwords">أنشئ كلمات مرور قوية وعشوائية بأمان تام</p>
        </div>
      </div>
      <div class="tool-meta">
        <div class="tool-stat-badge">📊 <span data-ar="الاستخدامات:" data-en="Uses:">الاستخدامات:</span> <span class="val" id="tool-usage-count">0</span></div>
        <div class="tool-stat-badge">👥 <span class="val" id="tool-live-users">--</span> <span data-ar="الآن" data-en="online">الآن</span></div>
        <button class="btn-icon" id="tool-fav-btn" title="مفضلة">🤍</button>
      </div>
    </div>
  </div>
  <div class="tool-workspace">
    <div class="ad-banner" style="margin-bottom:20px">📢 <span data-ar="مساحة إعلانية - Google AdSense" data-en="Ad Space - Google AdSense">مساحة إعلانية</span></div>
    <div class="tool-box">
      <h3 data-ar="⚙️ إعدادات كلمة المرور" data-en="⚙️ Password Settings">⚙️ إعدادات كلمة المرور</h3>
      <div class="form-group">
        <label data-ar="الطول" data-en="Length">الطول: <span id="pwd-length-val">16</span></label>
        <input type="range" id="pwd-length" min="8" max="64" value="16"
          oninput="document.getElementById('pwd-length-val').textContent=this.value">
      </div>
      <div class="checkbox-group">
        <label class="check-item">
          <input type="checkbox" id="use-upper" checked>
          <span data-ar="أحرف كبيرة (A-Z)" data-en="Uppercase (A-Z)">أحرف كبيرة (A-Z)</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="use-lower" checked>
          <span data-ar="أحرف صغيرة (a-z)" data-en="Lowercase (a-z)">أحرف صغيرة (a-z)</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="use-numbers" checked>
          <span data-ar="أرقام (0-9)" data-en="Numbers (0-9)">أرقام (0-9)</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="use-symbols">
          <span data-ar="رموز (!@#$%)" data-en="Symbols (!@#$%)">رموز (!@#$%)</span>
        </label>
      </div>
      <button class="btn-red" style="width:100%;padding:14px;font-size:1.05rem;margin-top:16px" onclick="generatePassword()"
        data-ar="🔑 إنشاء كلمة مرور جديدة" data-en="🔑 Generate New Password">🔑 إنشاء كلمة مرور جديدة</button>
    </div>
    <div class="tool-box" id="result-section" style="display:block">
      <h3 data-ar="✅ كلمة المرور" data-en="✅ Your Password">✅ كلمة المرور</h3>
      <div class="output-box">
        <button class="copy-btn" onclick="copyText(document.getElementById('pwd-output').textContent,this)">نسخ</button>
        <div id="pwd-output" style="font-family:monospace;font-size:1.3rem;letter-spacing:3px;word-break:break-all;padding:4px 0;min-height:30px"></div>
      </div>
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:0.85rem;color:var(--text-muted)" data-ar="القوة:" data-en="Strength:">القوة:</span>
          <span id="strength-label" style="font-size:0.85rem;font-weight:700"></span>
        </div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="strength-bar" style="background:var(--accent-red);width:0%"></div>
        </div>
      </div>
    </div>

    <div class="share-section">
      <h4 data-ar="📤 شارك هذه الأداة" data-en="📤 Share this tool">📤 شارك هذه الأداة</h4>
      <div class="share-btns">
        <button class="share-btn facebook" id="share-facebook">f Facebook</button>
        <button class="share-btn telegram" id="share-telegram">✈ Telegram</button>
        <button class="share-btn whatsapp" id="share-whatsapp">📱 WhatsApp</button>
        <button class="share-btn twitter" id="share-twitter">𝕏 Twitter</button>
      </div>
    </div>
    <div class="rating-section">
      <h4 data-ar="⭐ هل كانت هذه الأداة مفيدة؟" data-en="⭐ Was this tool helpful?">⭐ هل كانت هذه الأداة مفيدة؟</h4>
      <div class="rating-btns">
        <button class="rating-btn like" id="rate-like">👍 <span data-ar="نعم" data-en="Yes">نعم</span></button>
        <button class="rating-btn dislike" id="rate-dislike">👎 <span data-ar="لا" data-en="No">لا</span></button>
      </div>
      <div class="rating-bar-wrap"><div class="rating-bar" id="rating-bar" style="width:0%"></div></div>
      <p class="rating-text" id="rating-text"></p>
    </div>
    <div class="ad-banner" style="margin-top:20px">📢 <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div>
  </div>
</div>
<div id="toast-container" class="toast-container"></div>
<div id="loading-overlay" class="loading-overlay"><div class="spinner"></div><div class="loading-text"></div></div>
<script src="../js/app.js"></script>
<script src="../js/tools/dev-tools.js"></script>
<script>initPasswordGenerator();</script>
</body>
</html>
